[versions]
junit-jupiter = "5.12.2"
jserialcomm = "2.11.0"
logback = "1.5.18"
paho-mqtt = "1.2.5"
slf4j = "2.0.17"
spotbugs = "6.4.8"

[libraries]
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
jserialcomm = { module = "com.fazecast:jSerialComm", version.ref = "jserialcomm" }
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
paho-mqtt = { module = "org.eclipse.paho:org.eclipse.paho.client.mqttv3", version.ref = "paho-mqtt" }
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }

[plugins]
jib = { id = "com.google.cloud.tools.jib", version = "3.5.3" }
spotbugs = { id = "com.github.spotbugs", version.ref = "spotbugs" }
spotless = { id = "com.diffplug.spotless", version = "8.2.1" }
